[package]
name = "evo"
description = "The evo steward. Administers a catalogue, admits plugins, emits projections."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "evo"
path = "src/main.rs"

[dependencies]
evo-plugin-sdk = { path = "../evo-plugin-sdk" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "1"
anyhow = "1"
# clap is pinned to the 4.5 line because newer clap releases pull
# clap_lex >= 1.1.0, which requires Cargo feature `edition2024` and
# therefore Rust 1.85 or newer. Our declared MSRV is 1.80 (see
# workspace.package.rust-version). Raising this pin requires either
# raising the workspace MSRV or verifying the transitive graph again.
clap = { version = "~4.5", features = ["derive"] }

# clap_lex is a transitive dependency of clap. clap 4.5's internal
# constraint on clap_lex permits the 1.x line; clap_lex 1.1.0 is the
# version that hard-requires edition2024. Pinning clap alone is not
# sufficient because semver constraints do not cascade tree-wide;
# each crate resolves its own deps within its own constraint. We
# declare clap_lex as a direct dep here solely to force the resolver
# onto the 0.7 line, which is MSRV 1.80 compatible. It is not imported
# by our code; the declaration exists to constrain resolution.
clap_lex = "~0.7"

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

base64 = "0.22"
semver = { version = "1", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }

[target.'cfg(target_os = "linux")'.dependencies]
tracing-journald = "0.3"

[dev-dependencies]
evo-example-echo = { path = "../evo-example-echo" }
tempfile = "3"

[lints]
workspace = true
