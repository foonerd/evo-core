# Synthetic watch plugin — out-of-process bundle manifest.
#
# Registers BOTH an appointment (the trigger source) and a watch
# (matching the AppointmentFired happening) on every load(). The
# appointment fires after FIRE_OFFSET_MS, emitting an
# AppointmentFired happening which the watch's HappeningMatch
# condition matches. Both the appointment action and the watch
# action loop back to this plugin's Respondent::handle_request
# (one as request_type "appointment_fired", the other as
# request_type "watch_fired"), and the plugin records each
# arrival to {state_dir}/watch-fires.log.
#
# Used by T2.watch-happening-match to verify the framework's
# watch dispatch path end-to-end (HappeningMatch evaluation →
# WatchFired emission → action dispatch → handle_request).

[plugin]
name = "org.evoframework.acceptance.watch-plugin"
version = "0.1.0"
contract = 1

[target]
shelf = "acceptance.watch"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "out-of-process"
exec = "plugin.bin"

[trust]
class = "platform"

[prerequisites]
evo_min_version = "0.1.0"
os_family = "any"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 16
max_cpu_percent = 1

[lifecycle]
hot_reload = "restart"
autostart = true
restart_on_crash = false
restart_budget = 0

[capabilities]
appointments = true
watches = true

[capabilities.respondent]
request_types = ["appointment_fired", "watch_fired"]
response_budget_ms = 1000
