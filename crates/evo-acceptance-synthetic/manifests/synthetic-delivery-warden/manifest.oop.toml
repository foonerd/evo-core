# Synthetic reconciliation delivery warden — out-of-process bundle
# manifest.
#
# Admits as a singleton warden on the synthetic
# `acceptance.delivery` shelf. Declares `course_correct_verbs =
# ["apply"]` — the reserved verb the framework's
# `ReconciliationCoordinator` uses on the `course_correct`
# envelope. Custody is held for the lifetime of the pair
# (the framework takes one custody at boot for each declared pair
# and keeps it until the pair is removed); the warden records each
# `apply` to its event log so scenarios can assert that compose +
# apply round-tripped.
#
# Used by T2.reconciliation-compose-apply, T3.recon-fast-watch,
# T5.plugin-crash-mid-recon. Has no value outside those scenarios.

[plugin]
name = "org.evoframework.acceptance.synthetic-delivery-warden"
version = "0.1.0"
contract = 1

[target]
shelf = "acceptance.delivery"
shape = 1

[kind]
instance = "singleton"
interaction = "warden"

[transport]
type = "out-of-process"
exec = "plugin.bin"

[trust]
class = "platform"

[prerequisites]
evo_min_version = "0.1.0"
os_family = "any"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 16
max_cpu_percent = 1

[lifecycle]
hot_reload = "restart"
autostart = true
restart_on_crash = false
restart_budget = 0

[capabilities.warden]
custody_domain = "acceptance"
custody_exclusive = false
course_correction_budget_ms = 5000
custody_failure_mode = "abort"
course_correct_verbs = ["apply"]
