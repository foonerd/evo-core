# Out-of-process bundle manifest for the example echo plugin.
#
# This is the production-shaped variant. The publish workflow
# (`.github/workflows/publish.yml`) stages a bundle directory per
# target arch containing this file (renamed to `manifest.toml`)
# plus the cross-compiled `echo-wire` binary as `plugin.bin`, signs
# with the framework release signing key, packs as `.tar.gz`, and
# pushes to `foonerd/evo-core-artefacts` under
# `bundles/org.evo.example.echo/<target>/`.
#
# The companion in-process variant (`manifest.toml` in this same
# directory) is what `evo-example-distribution` embeds inline for
# the in-process admission path. Both manifests describe the same
# plugin at the same version; only the transport differs.
#
# See `docs/engineering/PLUGIN_PACKAGING.md` for the bundle layout
# contract and `docs/engineering/RELEASE_PLANE.md` for how this
# bundle reaches an operator.

[plugin]
name = "org.evo.example.echo"
version = "0.1.1"
contract = 1

[target]
shelf = "example.echo"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "out-of-process"
exec = "plugin.bin"

[trust]
class = "platform"

[prerequisites]
evo_min_version = "0.1.0"
os_family = "any"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 16
max_cpu_percent = 1

[lifecycle]
hot_reload = "restart"
autostart = true
restart_on_crash = true
restart_budget = 5

[capabilities.respondent]
request_types = ["echo"]
response_budget_ms = 1000
