[package]
name = "evo-plugin-sdk"
description = "SDK for authoring plugins on the evo steward fabric."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["contract"]
# The manifest module is always compiled; it has no optional dependencies
# and is the SDK's foundation. Listed here for documentation.
manifest = []
# Plugin contract traits and supporting types. Pulls in tracing for
# structured logging per docs/engineering/LOGGING.md.
contract = ["dep:tracing"]

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
semver = { version = "1", features = ["serde"] }
regex = "1"
once_cell = "1"
tracing = { version = "0.1", optional = true }

[lints]
workspace = true
