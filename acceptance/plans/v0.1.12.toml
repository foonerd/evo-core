# --- Hot reload (Live mode) ---

[[scenarios]]
id = "T2.hot-reload-live-inproc"
tier = "T2"
description = """
In-process plugin with `lifecycle.hot_reload = "live"`;
`reload_plugin` preserves state via prepare/load_with_state on the
same Plugin trait object inside one process. Distinct from
`T2.hot-reload-live-oop` because the in-process path skips the
spawn/terminate pair, the wire-frame encode of the StateBlob,
and the successor-socket bind. Validates that the framework's
`reload_plugin_in_process_live` correctly threads the StateBlob
between prepare and load_with_state without going through wire.

The scenario swaps the production steward binary for the
`evo-acceptance-distribution` (built from
`crates/evo-acceptance-distribution/`) which admits the synthetic
ReloadPlugin in-process under
`acceptance.reload-inproc`, then runs the OOP discovery pass so
other plugins still admit. Asserts: cold-load fired
`event=load`; reload triggered `event=prepare schema=1
payload_len=N`; predecessor `event=unload`; successor
`event=load_with_state schema=1 payload_len=N` with N matching
the prepare's emit (byte-equal blob round-trip).
"""
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.reload-plugin-inproc
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-inproc.bak
EVO_BAK=/tmp/evo-binary.bak
EVO_BIN=/opt/evo/bin/evo
ACCEPTANCE_BIN=/var/lib/evo-acceptance-fixtures/evo-acceptance-distribution
INPROC_STATE_DIR=/var/lib/evo/plugins/$PLUGIN/state
sudo cp $CAT $BAK
sudo cp $EVO_BIN $EVO_BAK
trap '
  sudo systemctl stop evo;
  sudo cp $EVO_BAK $EVO_BIN;
  sudo cp $BAK $CAT;
  sudo rm -rf /var/lib/evo/plugins/$PLUGIN;
  sudo systemctl start evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "reload-inproc"
shape = 1
description = "Synthetic in-process reload-plugin shelf."
TOML

sudo systemctl stop evo
sudo cp $ACCEPTANCE_BIN $EVO_BIN
sudo chmod 755 $EVO_BIN
sudo systemctl start evo
sleep 5

evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:.*admitted"
sudo grep -q "^event=load$" $INPROC_STATE_DIR/reload-events.log

RELOAD_OUT=$(evo-plugin-tool admin reload-plugin $PLUGIN --socket=/run/evo/evo.sock 2>&1)
echo "$RELOAD_OUT"
echo "$RELOAD_OUT" | grep -q "reloaded: true"

sudo grep -q "^event=prepare schema=1 payload_len=" $INPROC_STATE_DIR/reload-events.log
sudo grep -q "^event=unload$" $INPROC_STATE_DIR/reload-events.log
sudo grep -q "^event=load_with_state schema=1 payload_len=" $INPROC_STATE_DIR/reload-events.log

PAYLOAD_LEN_PREPARE=$(sudo grep "^event=prepare schema=1 payload_len=" $INPROC_STATE_DIR/reload-events.log | tail -1 | sed 's/.*payload_len=//')
PAYLOAD_LEN_LOAD_WITH_STATE=$(sudo grep "^event=load_with_state schema=1 payload_len=" $INPROC_STATE_DIR/reload-events.log | tail -1 | sed 's/.*payload_len=//')
test "$PAYLOAD_LEN_PREPARE" = "$PAYLOAD_LEN_LOAD_WITH_STATE"
test "$PAYLOAD_LEN_PREPARE" -gt "0"

echo "T2.hot-reload-live-inproc PASS (cold-load + prepare + load_with_state with byte-equal blob round-trip; payload_len=$PAYLOAD_LEN_PREPARE)"
"""
requires_capability = "test_fixture_synthetic_reload_plugin_inproc"
timeout_secs = 90
assertions = [
    { kind = "exit_code", expected = 0 },
]

