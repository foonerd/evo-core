# --- Time and clock trust ---

[[scenarios]]
id = "T2.time-trust-state-reported"
tier = "T2"
description = "TimeTrust state is observable via the steward's describe_capabilities response. Issues `evo-plugin-tool admin describe-capabilities` and asserts the response carries a `clock_trust:` line with one of the four valid enum values (trusted / untrusted / stale / adjusting)."
command = """
set -eo pipefail
out=$(evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock 2>&1)
echo "$out" | grep -qE '^  clock_trust:      (trusted|untrusted|stale|adjusting)$'
"""
requires_capability = "test_fixture_capabilities_query"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.time-trust-untrusted-on-no-ntp"
tier = "T2"
description = """
When the kernel reports `STA_UNSYNC` (NTP unavailable),
`TimeTrust` transitions out of `Trusted` (to `Stale` while the
last sync is within `max_acceptable_staleness_ms`, then to
`Untrusted` once that elapses) and the framework emits
`ClockTrustChanged` for each classification transition.

Drives the framework's tracker via a file-based override
(`EVO_TIME_TRUST_OVERRIDE_FILE` env points at a path the
tracker re-reads every tick) so the test can flip kernel-sync
state mid-boot. Two stages:

- **Stage 1**: file contains `synced` → tracker advances boot
  Untrusted → Trusted, emits `ClockTrustChanged untrusted →
  trusted`.
- **Stage 2**: file flipped to `unsynced` → tracker observes
  `synced=false` with prior sync recorded; with
  `max_acceptable_staleness_ms = 0` (set in `/etc/evo/evo.toml`
  for the test scope) the next tick transitions to `Stale` and
  emits `ClockTrustChanged trusted → stale`.

Synthetic-acceptance-only override; production stewards never
set `EVO_TIME_TRUST_OVERRIDE_FILE`. The override file lives at
`/var/lib/evo/state/time-trust-override` because systemd's
`PrivateTmp=yes` would otherwise hide a `/tmp/...` path from
the service.

Asserts: stage 1 reaches `clock_trust: trusted`; stage 2
reaches `clock_trust: stale` (or `untrusted`); both
ClockTrustChanged transitions captured on the bus replay
(`untrusted → trusted` AND `trusted → (stale|untrusted)`); at
least two transitions total.
"""
command = """
set -eo pipefail
DROP=/etc/systemd/system/evo.service.d/time-trust-untrusted.conf
SUB_OUT=/tmp/time-trust-untrusted.sub.out
OVERRIDE_FILE=/var/lib/evo/state/time-trust-override
EVO_TOML=/etc/evo/evo.toml
EVO_TOML_BAK=/tmp/evo.toml.bak
sudo cp $EVO_TOML $EVO_TOML_BAK
trap '
  sudo cp $EVO_TOML_BAK $EVO_TOML;
  sudo rm -f $DROP $SUB_OUT $OVERRIDE_FILE $EVO_TOML_BAK;
  sudo systemctl daemon-reload;
  sudo systemctl restart evo;
  sleep 3
' EXIT

if ! sudo grep -q "^\\[time_trust\\]" $EVO_TOML; then
    sudo tee -a $EVO_TOML > /dev/null <<'TOML'

[time_trust]
max_acceptable_staleness_ms = 0
poll_interval_secs = 2
TOML
fi

echo "synced" | sudo tee $OVERRIDE_FILE > /dev/null
sudo chmod 644 $OVERRIDE_FILE

sudo mkdir -p /etc/systemd/system/evo.service.d
sudo tee $DROP > /dev/null <<CONF
[Service]
Environment=EVO_TIME_TRUST_OVERRIDE_FILE=$OVERRIDE_FILE
CONF
sudo systemctl daemon-reload

SINCE_SEQ=$(evo-plugin-tool admin subscribe-happenings --max-count 0 --duration-secs 1 --socket=/run/evo/evo.sock 2>&1 | head -1 | python3 -c "import sys, json; print(json.loads(sys.stdin.read())['current_seq'])")

sudo systemctl restart evo
sleep 6

LIVE_S1=$(evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock 2>&1 | grep -i clock_trust | sed 's/.*clock_trust:[[:space:]]*//' | tr -d ' ')
test "$LIVE_S1" = "trusted"

echo "unsynced" | sudo tee $OVERRIDE_FILE > /dev/null
sleep 6

LIVE_S2=$(evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock 2>&1 | grep -i clock_trust | sed 's/.*clock_trust:[[:space:]]*//' | tr -d ' ')
case "$LIVE_S2" in
    stale|untrusted) ;;
    *) echo "expected stale or untrusted, got: $LIVE_S2" >&2; exit 1 ;;
esac

evo-plugin-tool admin subscribe-happenings \\
    --since "$SINCE_SEQ" \\
    --variants clock_trust_changed \\
    --max-count 10 \\
    --duration-secs 5 \\
    --socket=/run/evo/evo.sock \\
    > $SUB_OUT 2>&1 || true
cat $SUB_OUT

grep -q '"from":"untrusted","to":"trusted"' $SUB_OUT
grep -E '"from":"trusted","to":"(stale|untrusted)"' $SUB_OUT
TRANSITIONS=$(grep -c '"clock_trust_changed"' $SUB_OUT || true)
test "$TRANSITIONS" -ge "2"

echo "T2.time-trust-untrusted-on-no-ntp PASS (Trusted → $LIVE_S2; $TRANSITIONS transitions)"
"""
requires_capability = "test_fixture_ntp_isolation"
timeout_secs = 90
assertions = [
    { kind = "exit_code", expected = 0 },
]

