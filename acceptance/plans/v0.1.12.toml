P99_US=$(echo "$BENCH_OUT" | grep -oP 'p99_us=\\K[0-9]+')

evo-plugin-tool admin warden release-custody --shelf acceptance.fast-path --handle-id "$HANDLE_ID" --handle-started-at-ms "$HANDLE_TS" --socket=/run/evo/evo.sock > /dev/null 2>&1 || true

test "$RATE" -ge "1000"
test "$P50_US" -lt "5000"
test "$P99_US" -lt "20000"
