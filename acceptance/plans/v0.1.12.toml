[[scenarios]]
id = "T2.warden-verb-gate"
tier = "T2"
description = "Synthetic warden declares course_correct_verbs=[\"a\",\"b\"] in its manifest; the operator-issued `evo-plugin-tool admin warden course-correct --verb c` is refused at the framework's router boundary (StewardError::Dispatch) before reaching the plugin's body. Scenario greps the structured stderr for the verb-gate refusal phrase."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.synthetic-warden
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-warden-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-warden-verb-gate.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["consumer"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "warden"
shape = 1
description = "Synthetic warden shelf for verb-gate scenario."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
# Issue course_correct for an undeclared verb. The framework's
# router refuses before the plugin body runs; the CLI exits non-
# zero and emits the structured refusal on stderr. The trailing
# `|| true` keeps `set -e` from killing the scenario on the
# expected non-zero exit; we then assert the refusal phrase.
OUT=$(evo-plugin-tool admin warden course-correct --shelf acceptance.warden --custody-type any --verb c --socket=/run/evo/evo.sock 2>&1 || true)
echo "$OUT" | grep -q "did not declare course_correct verb"
echo "$OUT" | grep -q "\\\"c\\\""
"""
requires_capability = "test_fixture_synthetic_warden"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

