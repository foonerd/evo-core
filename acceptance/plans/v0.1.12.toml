description = "Synthetic shelf for appointment past-due scenario."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 2
sudo systemctl stop evo
sleep 8
RESTART_MS=$(date +%s%3N)
sudo systemctl start evo
sleep 4
echo "=== state log ==="
sudo cat $LOG 2>&1
echo
FIRES=$(sudo grep -c '^fired_at_ms=' $LOG)
echo "fires:           $FIRES"
echo "restart_ms:      $RESTART_MS"
test "$FIRES" = "1"
