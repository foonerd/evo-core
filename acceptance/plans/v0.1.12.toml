description = "Synthetic plugin's first load() registers a OneShot for `now + 5s` (Catchup miss-policy) and writes a marker to its state_dir; subsequent loads skip re-registration. Scenario installs the bundle, restarts the steward (first load fires the registration), waits 2 s (less than the fire window), stops the steward, waits another 8 s so the appointment is past-due by ~5 s, restarts the steward. The framework's appointment runtime rehydrates the past-due row from the durable `appointments` table (Phase 1.Q), the Catchup miss-policy fires it once on the first runtime tick after boot, and the dispatch loops back to the plugin's handle_request which records the (single) fire. Asserts exactly one fire entry in the log AND the fire timestamp falls after the second steward boot."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.appointment-past-due-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-appointment-past-due-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-appointment-past-due.bak
