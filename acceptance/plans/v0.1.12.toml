[[scenarios]]
id = "T2.hot-reload-blob-size-cap"
tier = "T2"
description = """
Three-case demonstration of the framework's per-plugin
`lifecycle.live_blob_max` manifest field and the absolute hard
ceiling on `prepare_for_live_reload` state blobs:

- **Case A** — default-cap manifest (no `live_blob_max`,
  framework default 16 MiB), 20 MiB blob → refused. The error
  message names "default 16 MiB cap of 16777216 bytes" and the
  successor's `load_with_state` never fires.
- **Case B** — raised-cap manifest declaring `live_blob_max =
  33554432` (32 MiB), 20 MiB blob → admitted. The successor's
  `load_with_state` runs with the full 20 MiB payload, proving
  the per-manifest raise actually crosses the wire and reaches
  the new instance.
- **Case C** — raised-cap manifest, 40 MiB blob → refused. The
  error names "per-manifest live_blob_max of 33554432 bytes"
  (operator-actionable: distinguishes which knob hit the cap).

Same plugin binary serves both manifests; identity is selected
per case via the systemd drop-in's
`EVO_ACCEPTANCE_RELOAD_PLUGIN_NAME` env so describe() and the
manifest agree. Validates the wire raise to MAX_FRAME_SIZE = 64
MiB end-to-end (a 20 MiB blob would have failed at the codec
frame check under the legacy 1 MiB cap before admission's blob
check could fire).
"""
command = """
set -eo pipefail
PLUGIN_DEFAULT=org.evoframework.acceptance.reload-plugin
PLUGIN_RAISED=org.evoframework.acceptance.reload-plugin-raised-cap
BUNDLE_DEFAULT=/var/lib/evo-acceptance-fixtures/synthetic-reload-bundle.tar.gz
BUNDLE_RAISED=/var/lib/evo-acceptance-fixtures/synthetic-reload-raised-cap-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-blob-cap.bak
DROP=/etc/systemd/system/evo.service.d/blob-cap.conf
EVENT_LOG_DEFAULT=/var/lib/evo/plugins/$PLUGIN_DEFAULT/state/reload-events.log
EVENT_LOG_RAISED=/var/lib/evo/plugins/$PLUGIN_RAISED/state/reload-events.log
sudo cp $CAT $BAK
trap '
  sudo rm -rf /var/lib/evo/plugins/$PLUGIN_DEFAULT /var/lib/evo/plugins/$PLUGIN_RAISED;
  sudo cp $BAK $CAT;
  sudo rm -f $DROP;
  sudo systemctl daemon-reload;
  sudo systemctl restart evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "reload"
shape = 1
description = "Synthetic reload-plugin shelf (default-cap variant)."

[[racks.shelves]]
name = "reload-raised"
shape = 1
description = "Synthetic reload-plugin shelf (raised-cap variant)."
TOML
sudo mkdir -p /etc/systemd/system/evo.service.d

evo-plugin-tool install $BUNDLE_DEFAULT --to /var/lib/evo/plugins > /dev/null
evo-plugin-tool install $BUNDLE_RAISED --to /var/lib/evo/plugins > /dev/null

# === Case A ===
sudo tee $DROP > /dev/null <<'CONF'
[Service]
Environment=EVO_ACCEPTANCE_RELOAD_BLOB_BYTES=20971520
CONF
sudo systemctl daemon-reload
sudo systemctl restart evo
sleep 5

RELOAD_OUT_A=$(evo-plugin-tool admin reload-plugin $PLUGIN_DEFAULT --socket=/run/evo/evo.sock 2>&1 || true)
echo "$RELOAD_OUT_A"
echo "$RELOAD_OUT_A" | grep -q "exceeds default 16 MiB cap"
echo "$RELOAD_OUT_A" | grep -q "20971520 bytes"
sudo grep -q "^event=prepare schema=1 payload_len=20971520" $EVENT_LOG_DEFAULT
SUCCESSOR_LOADS_A=$(sudo grep -c "^event=load_with_state schema=1" $EVENT_LOG_DEFAULT || true)
test "$SUCCESSOR_LOADS_A" = "0"
echo "Case A PASS: refusal at default 16 MiB cap."

# === Case B ===
sudo tee $DROP > /dev/null <<'CONF'
[Service]
Environment=EVO_ACCEPTANCE_RELOAD_PLUGIN_NAME=org.evoframework.acceptance.reload-plugin-raised-cap
Environment=EVO_ACCEPTANCE_RELOAD_BLOB_BYTES=20971520
CONF
sudo systemctl daemon-reload
sudo systemctl restart evo
sleep 5
sudo truncate -s 0 $EVENT_LOG_RAISED 2>/dev/null || true
sudo systemctl restart evo
sleep 5

RELOAD_OUT_B=$(evo-plugin-tool admin reload-plugin $PLUGIN_RAISED --socket=/run/evo/evo.sock 2>&1 || true)
echo "$RELOAD_OUT_B"
echo "$RELOAD_OUT_B" | grep -qv "exceeds"
sudo grep -q "^event=prepare schema=1 payload_len=20971520" $EVENT_LOG_RAISED
sudo grep -q "^event=load_with_state schema=1 payload_len=20971520" $EVENT_LOG_RAISED
echo "Case B PASS: per-manifest 32 MiB cap admitted the 20 MiB blob."

# === Case C ===
sudo tee $DROP > /dev/null <<'CONF'
[Service]
Environment=EVO_ACCEPTANCE_RELOAD_PLUGIN_NAME=org.evoframework.acceptance.reload-plugin-raised-cap
Environment=EVO_ACCEPTANCE_RELOAD_BLOB_BYTES=41943040
CONF
sudo systemctl daemon-reload
sudo truncate -s 0 $EVENT_LOG_RAISED 2>/dev/null || true
sudo systemctl restart evo
sleep 5

RELOAD_OUT_C=$(evo-plugin-tool admin reload-plugin $PLUGIN_RAISED --socket=/run/evo/evo.sock 2>&1 || true)
echo "$RELOAD_OUT_C"
echo "$RELOAD_OUT_C" | grep -q "exceeds per-manifest live_blob_max"
echo "$RELOAD_OUT_C" | grep -q "41943040 bytes"
echo "$RELOAD_OUT_C" | grep -q "33554432 bytes"
sudo grep -q "^event=prepare schema=1 payload_len=41943040" $EVENT_LOG_RAISED
SUCCESSOR_LOADS_C=$(sudo grep -c "^event=load_with_state schema=1" $EVENT_LOG_RAISED || true)
test "$SUCCESSOR_LOADS_C" = "0"
echo "Case C PASS: per-manifest 32 MiB cap refused the 40 MiB blob."

echo "T2.hot-reload-blob-size-cap PASS (3/3 cases)"
"""
requires_capability = "test_fixture_synthetic_reload_plugin_oversized_blob"
timeout_secs = 180
assertions = [
    { kind = "exit_code", expected = 0 },
]

