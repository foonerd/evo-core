[[scenarios]]
id = "T5.disk-full"
tier = "T5"
description = """
State-mutating op against an exhausted filesystem. Mounts a 10
MB tmpfs at `/var/lib/evo/test-state`, points the steward's
[persistence].path at it via evo.toml override, fills the
tmpfs to ~95%, pre-seeds 1000 acceptance_track_v1 subjects,
hot-reloads the catalogue to drop v1 → orphans surface, then
issues a grammar migrate. Asserts: (1) the migrate verb
returns a structured error (class=internal,
subclass=persistence_error, message naming "disk is full"),
(2) the steward stays alive throughout, (3) after freeing
space + retrying the migrate, all 1000 v1 subjects migrate to
v2 cleanly (zero v1 rows post-recovery).

Production state stays untouched: tmpfs is in
`/var/lib/evo/test-state` (not the production `/var/lib/evo/state`),
the `evo.toml` override points only at this path, and the trap
restores the original config on exit. Demonstrates that SQLite
disk-full propagates through the framework's persistence
abstraction as a structured refusal rather than corrupting the
DB or crashing the steward.
"""
command = """
set -eo pipefail
EVO_TOML=/etc/evo/evo.toml
EVO_TOML_BAK=/tmp/evo-toml-disk-full.bak
TEST_STATE_DIR=/var/lib/evo/test-state
CAT=/opt/evo/catalogue/default.toml
CAT_BAK=/tmp/evo-cat-disk-full.bak
# Derive the steward's service user from the production state directory
# so this scenario stays portable across distributions (the user name
# differs per product line; the framework imposes none).
EVO_USER=$(stat -c %U /var/lib/evo)
EVO_GROUP=$(stat -c %G /var/lib/evo)
sudo cp $EVO_TOML $EVO_TOML_BAK
sudo cp $CAT $CAT_BAK
trap '
  sudo systemctl stop evo;
  if mountpoint -q $TEST_STATE_DIR; then sudo umount $TEST_STATE_DIR || true; fi;
  sudo rm -rf $TEST_STATE_DIR;
  sudo cp $EVO_TOML_BAK $EVO_TOML;
  sudo cp $CAT_BAK $CAT;
  sudo rm -f $EVO_TOML_BAK $CAT_BAK;
  sudo systemctl start evo;
  sleep 3
' EXIT

sudo systemctl stop evo

sudo mkdir -p $TEST_STATE_DIR
sudo mount -t tmpfs -o size=10m tmpfs $TEST_STATE_DIR
sudo chown $EVO_USER:$EVO_GROUP $TEST_STATE_DIR
sudo chmod 755 $TEST_STATE_DIR

sudo python3 -c "
import re
with open('$EVO_TOML') as f: t = f.read()
t = re.sub(r'\\[persistence\\][^\\[]*', '[persistence]\\npath = \\"$TEST_STATE_DIR/evo.db\\"\\n\\n', t)
with open('$EVO_TOML','w') as f: f.write(t)
"
sudo systemctl start evo
sleep 5
evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock > /dev/null

sudo tee -a $CAT > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v1"
[[subjects]]
name = "acceptance_track_v2"
TOML
evo-plugin-tool admin reload catalogue --inline "$(sudo cat $CAT)" --socket=/run/evo/evo.sock 2>&1 | grep -q "duration ms"

# Fill tmpfs to ~95%.
TOTAL_KB=10240
USED_KB=$(df -k $TEST_STATE_DIR | awk 'NR==2 {print $3}')
FILL_KB=$((TOTAL_KB * 95 / 100 - USED_KB))
sudo dd if=/dev/zero of=$TEST_STATE_DIR/filler bs=1k count=$FILL_KB 2>&1 | tail -1

# Pre-seed 1000 v1 subjects (steward must be stopped to write
# directly; the fill will trigger disk-full mid-migrate).
sudo systemctl stop evo
sudo -u $EVO_USER sqlite3 $TEST_STATE_DIR/evo.db "
BEGIN;
WITH RECURSIVE seq(n) AS (SELECT 0 UNION ALL SELECT n+1 FROM seq WHERE n < 999)
INSERT INTO subjects (id, subject_type, created_at_ms, modified_at_ms)
SELECT 'df-' || n, 'acceptance_track_v1', $(date +%s%3N), $(date +%s%3N) FROM seq;
COMMIT;
" 2>&1 | tail -3 || true
sudo systemctl start evo
sleep 4

CAT_V2=/tmp/evo-cat-disk-full-v2.toml
sudo cp $CAT_BAK $CAT_V2
sudo tee -a $CAT_V2 > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v2"
TOML
evo-plugin-tool admin reload catalogue --inline "$(sudo cat $CAT_V2)" --socket=/run/evo/evo.sock 2>&1 | grep -q "duration ms" || true
sleep 1

# Phase 1: trigger migration; expect disk-full refusal.
MIGRATE_OUT=$(evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="disk-full-test" --batch-size=1000 --socket=/run/evo/evo.sock 2>&1 || true)
echo "$MIGRATE_OUT"
echo "$MIGRATE_OUT" | grep -qiE "disk is full|disk full"
systemctl is-active evo > /dev/null

# Phase 2: free space, retry, expect success.
sudo rm -f $TEST_STATE_DIR/filler
RETRY_OUT=$(evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="disk-full-test-retry" --batch-size=1000 --socket=/run/evo/evo.sock 2>&1)
echo "$RETRY_OUT"

ROWS_V1=$(sudo -u $EVO_USER sqlite3 $TEST_STATE_DIR/evo.db "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1';")
test "$ROWS_V1" = "0"
systemctl is-active evo > /dev/null

echo "T5.disk-full PASS (structured refusal during fill; full recovery after free; v1=0 post-recovery)"
"""
requires_capability = "test_fixture_disk_full"
timeout_secs = 300
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T5.network-drop"
tier = "T5"
description = """
Ungraceful client wire-drop hardening. Drives 80 ungraceful
closes against `/run/evo/evo.sock` across four malformed-frame
modes (`empty-close` — connect then immediately close;
`partial-len` — send 2 of 4 length-prefix bytes then close;
`bad-len` — send a length prefix claiming 1 GB then partial
data then close; `bad-payload` — send a 10-byte length prefix
then non-JSON garbage). After the storm, asserts the steward
is still active, still serves a normal admin verb, and RSS
growth across the 80 drops stays under 20 MB (bounds any
per-connection leak at ≤256 kB).

Driven from a Python script that uses raw `AF_UNIX
SOCK_STREAM` sockets and closes the fd without `shutdown()` so
the kernel sends RST — matches a real ungraceful peer
(crashed client, killed terminal, network blip).
"""
command = """
set -eo pipefail
ITERATIONS=20

ungraceful_close() {
    local mode=$1
    python3 -c "
import socket
s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
s.connect('/run/evo/evo.sock')
mode = '$mode'
if mode == 'partial-len':
    s.send(b'\\x00\\x00')
elif mode == 'bad-len':
    s.send(b'\\x40\\x00\\x00\\x00')
    s.send(b'GARBAGE PARTIAL DATA')
elif mode == 'bad-payload':
    s.send(b'\\x00\\x00\\x00\\x0a')
    s.send(b'NOT JSON!!')
elif mode == 'empty-close':
    pass
s.close()
"
}

PRE_RSS=$(ps -p $(pgrep -x evo) -o rss --no-headers | tr -d ' ')

for i in $(seq 1 $ITERATIONS); do
    for mode in partial-len bad-len bad-payload empty-close; do
        ungraceful_close $mode
    done
done

evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock > /dev/null
systemctl is-active evo > /dev/null

POST_RSS=$(ps -p $(pgrep -x evo) -o rss --no-headers | tr -d ' ')
GROWTH=$((POST_RSS - PRE_RSS))
test "$GROWTH" -lt "20480"

echo "T5.network-drop PASS ($((ITERATIONS * 4)) ungraceful drops; steward responsive; RSS growth ${GROWTH} kB)"
"""
requires_capability = "test_fixture_network_drop"
timeout_secs = 120
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T5.flight-mode-no-panic"
tier = "T5"
description = "Repeated alternating flight-mode operations leave the steward up and panic-free. Five toggles alternating on/off against a synthetic flight-rack plugin; after the run the steward is still active, no panic appears in the journal, and a follow-up flight set still dispatches. (The mandatory binary criterion: flight-mode operations must never panic the framework.)"
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.flight-rack-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-flight-rack-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-flight-no-panic.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "flight_mode"
family = "domain"
kinds = ["device"]
charter = "Synthetic flight-mode rack for acceptance scenarios."

[[racks.shelves]]
name = "bluetooth"
shape = 1
description = "Synthetic flight-mode shelf for acceptance scenarios."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
# Five rapid toggles alternating on/off. Each must dispatch; any
# refusal short-circuits the loop and fails the scenario via the
# `set -e` discipline.
for i in 1 2 3 4 5; do
  if [ $((i % 2)) = 1 ]; then
    evo-plugin-tool admin flight set bluetooth on --socket=/run/evo/evo.sock 2>&1 | grep -q "ACTIVE"
  else
    evo-plugin-tool admin flight set bluetooth off --socket=/run/evo/evo.sock 2>&1 | grep -q "CLEARED"
  fi
done
# Binary criterion: no panic in the steward's recent journal.
! sudo journalctl -u evo --since "60 seconds ago" --no-pager 2>&1 | grep -iE "panicked|panic at"
# Steward still active.
sudo systemctl is-active evo | grep -q '^active$'
# A follow-up flight set still dispatches cleanly — the steward is
# not just up but still functioning.
evo-plugin-tool admin flight set bluetooth off --socket=/run/evo/evo.sock 2>&1 | grep -q "CLEARED"
"""
requires_capability = "test_fixture_synthetic_flight_rack"
timeout_secs = 180
assertions = [
    { kind = "exit_code", expected = 0 },
]

# ============================================================
# Performance baselines — recorded in §9 of the readiness report.
# Decider records the observed value alongside the target.
# ============================================================

[[performance_baselines]]
metric = "Steward cold boot time"
target = "<3 sec"
measured_at = "T1.boot"

[[performance_baselines]]
metric = "Reload-catalogue (no-change skip)"
target = "<50 ms"
measured_at = "T2.reload-catalogue-no-change-skip"

[[performance_baselines]]
metric = "Orphan migration (50k subjects, NVMe)"
target = "<10 sec"
measured_at = "T2.grammar-orphans-bulk-50k"

[[performance_baselines]]
metric = "Fast-path RTT p50"
target = "<5 ms"
measured_at = "T2.fast-path-rtt"

[[performance_baselines]]
metric = "Fast-path RTT p99"
target = "<20 ms"
measured_at = "T2.fast-path-rtt"

[[performance_baselines]]
metric = "Coalescing throughput (input)"
target = "≥10k events/sec"
measured_at = "T4.coalescing-burst"

[[performance_baselines]]
metric = "Memory growth over 4h idle"
target = "<50 MB"
measured_at = "T4.idle-soak"

[[performance_baselines]]
metric = "Concurrent ops latency p99 during bulk migration"
target = "<500 ms"
measured_at = "T4.bulk-orphan-stress"

[[performance_baselines]]
metric = "Fast-path throughput single-client"
target = "≥1000 ops/sec"
measured_at = "T4.fast-path-throughput"
