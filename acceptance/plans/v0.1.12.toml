[[scenarios]]
id = "T2.version-skew-strict"
tier = "T2"
description = "Synthetic plugin declares evo_min_version=current (0.1.12), classify_skew returns Strict (delta=0 minor versions); manifest matches describe() so the drift detector stays silent; admission proceeds cleanly. Asserts diagnose reports state=admitted. The drift-refused half of the strict band is exercised separately by T2.manifest-drift-refused."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.skew-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-skew-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-skew-strict.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "skew"
shape = 1
description = "Synthetic respondent shelf for skew strict-band scenario."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
"""
requires_capability = "test_fixture_skew_plugin_strict"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.version-skew-warn-band"
tier = "T2"
description = """
Plugin with `evo_min_version` 2 minor versions behind the
framework admits with `PluginVersionSkewWarning` emitted (admit
+ warn — distinct from the strict band's clean admit and the
out-of-window band's hard refuse).

The framework's classify_skew uses `framework_minor -
plugin_minor`; the WarnBand classification requires delta=2.
The framework's own minor version is 1, so no real plugin can
land in WarnBand without an injection mechanism. The acceptance
distribution sets
`EVO_FRAMEWORK_VERSION_OVERRIDE=0.3.0` via systemd drop-in
(synthetic-acceptance only — production stewards never set this
env), and admits the synthetic warn-band plugin variant
declaring `evo_min_version = 0.1.0`. Delta = 2 → WarnBand →
admit + emit `PluginVersionSkewWarning {
skew_minor_versions: 2, evo_min_version: "0.1.0" }`.

Asserts:
- Plugin admitted (`admin diagnose` reports `state: admitted`).
- Exactly one `plugin_version_skew_warning` happening fired
  (filtered to the warn-band plugin, replayed via `since=`
  cursor captured before the restart).
- Warning carries `skew_minor_versions: 2` and
  `evo_min_version: "0.1.0"`.
"""
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.skew-warn-band
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-skew-warn-band-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-skew-warn.bak
DROP=/etc/systemd/system/evo.service.d/skew-warn.conf
SUB_OUT=/tmp/skew-warn.sub.out
sudo cp $CAT $BAK
trap '
  sudo rm -rf /var/lib/evo/plugins/$PLUGIN;
  sudo cp $BAK $CAT;
  sudo rm -f $DROP $SUB_OUT;
  sudo systemctl daemon-reload;
  sudo systemctl restart evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "skew-warn-band"
shape = 1
description = "Synthetic skew-plugin shelf (WarnBand variant)."
TOML

sudo mkdir -p /etc/systemd/system/evo.service.d
sudo tee $DROP > /dev/null <<'CONF'
[Service]
Environment=EVO_FRAMEWORK_VERSION_OVERRIDE=0.3.0
Environment=EVO_ACCEPTANCE_SKEW_PLUGIN_NAME=org.evoframework.acceptance.skew-warn-band
CONF
sudo systemctl daemon-reload

SINCE_SEQ=$(evo-plugin-tool admin subscribe-happenings --max-count 0 --duration-secs 1 --socket=/run/evo/evo.sock 2>&1 | head -1 | python3 -c "import sys, json; print(json.loads(sys.stdin.read())['current_seq'])")
echo "pre-restart seq: $SINCE_SEQ"

evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins > /dev/null
sudo systemctl restart evo
sleep 5

evo-plugin-tool admin subscribe-happenings \\
    --since $SINCE_SEQ \\
    --variants plugin_version_skew_warning \\
    --plugins $PLUGIN \\
    --max-count 5 \\
    --duration-secs 6 \\
    --socket=/run/evo/evo.sock \\
    > $SUB_OUT 2>&1 || true

cat $SUB_OUT

grep -q '"plugin_version_skew_warning"' $SUB_OUT
grep -q '"skew_minor_versions":2' $SUB_OUT
grep -q '"evo_min_version":"0.1.0"' $SUB_OUT
WARN_COUNT=$(grep -c '"plugin_version_skew_warning"' $SUB_OUT || true)
test "$WARN_COUNT" = "1"
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:.*admitted"

echo "T2.version-skew-warn-band PASS (plugin admitted under WarnBand; PluginVersionSkewWarning emitted with skew_minor_versions=2, evo_min_version=0.1.0)"
"""
requires_capability = "test_fixture_skew_plugin_warn_band_reachable"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

