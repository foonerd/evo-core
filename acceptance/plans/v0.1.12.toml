Subscribe with coalesce labels [variant, plugin] and a 200ms
window; the synthetic-coalescing-source plugin emits 100
PluginEvents of the same event_type with empty payload in a tight
burst. All 100 share the same coalesce key, so the subscriber sees
at most 2 deliveries (1 typical, 2 if the burst straddles a
window boundary). Validates the framework's per-bucket
collapse and monotonic-seq behaviour (the delivered seq is the
maximum suppressed seq so the cursor never retreats).
"""
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.synthetic-coalescing-source
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-coalescing-source-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
