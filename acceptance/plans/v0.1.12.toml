PLUGIN=org.evoframework.acceptance.prompt-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-prompt-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-prompt-text.bak
LOG=/var/lib/evo/plugins/$PLUGIN/state/prompt-outcomes.log
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
