# v0.1.12 scenario plan — comprehensive T1 through T5 coverage.
#
# This plan is the bed test for future development. Scenarios that
# can run today against any conforming evo-core deployment use real
# commands and concrete pass criteria. Scenarios that require
# synthetic test fixtures (synthetic plugin, scenario client,
# disk-fill harness, etc.) declare `requires_capability =
# "test_fixture_<name>"` and skip-with-reason on targets that do
# not advertise the fixture. As fixtures land, the target's
# descriptor declares the matching capability and the scenarios
# execute.
#
# Scenarios are authored once; the plan grows additively per
# release. Future-release plans copy this file and add scenarios
# for new framework deliverables.
#
# Default per-scenario timeout is 300s. T1 caps shorter for
# fast smoke; T4 stress / soak scenarios cap longer.

release = "v0.1.12"
coverage_note = "Comprehensive T1-T5; T4 stress/soak gated by test_fixture_long_runner so it does not run on smoke targets. Bed test for future development."

# ============================================================
# T1 — Bring-up smoke (<2 min, automated)
# ============================================================

[[scenarios]]
id = "T1.boot"
tier = "T1"
description = "Steward starts cleanly from cold boot."
command = "systemctl is-active evo.service"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
    { kind = "stdout_contains", value = "active" },
]

[[scenarios]]
id = "T1.no-recent-panic"
tier = "T1"
description = "No panic in the steward's journal in the last 24h."
command = "journalctl -u evo.service --since='24 hours ago' --no-pager 2>/dev/null | grep -ciE 'panic|panicked' || true"
timeout_secs = 30
assertions = [
    { kind = "stdout_matches", pattern = "^0\\s*$" },
]

[[scenarios]]
id = "T1.client-connect"
tier = "T1"
description = "Client connects via wire socket; read-only op round-trips. Uses admin grammar list as a no-argument read-only verb that exercises the wire connection + capability negotiation + dispatch path."
command = "evo-plugin-tool admin grammar list --socket=/run/evo/evo.sock 2>&1"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T1.idle"
tier = "T1"
description = "60-second idle period with no spurious panic, no error-level lines."
command = "sleep 60 && journalctl -u evo.service --since='65 seconds ago' --no-pager 2>/dev/null | grep -ciE 'panic|panicked|level=error' || true"
timeout_secs = 90
assertions = [
    { kind = "stdout_matches", pattern = "^0\\s*$" },
]

# ============================================================
# T2 — Per-deliverable functional (~30 min)
# Each major framework deliverable gets at least one scenario.
# ============================================================

# --- Catalogue corruption resilience ---

[[scenarios]]
id = "T2.catalogue-lkg-fallback"
tier = "T2"
description = "Configured catalogue corrupted; steward boots via LKG resilience fallback; degraded-boot warning emitted. Cleanup restores from the steward-maintained LKG mirror (always-valid by definition)."
command = """
set -eo pipefail
trap 'sudo cp /var/lib/evo/state/catalogue.lkg.toml /opt/evo/catalogue/default.toml; sudo systemctl restart evo; sleep 3' EXIT
echo "this is not valid TOML }}}" | sudo tee /opt/evo/catalogue/default.toml > /dev/null
sudo systemctl restart evo
sleep 4
systemctl is-active evo > /dev/null
journalctl -u evo.service --since '20 seconds ago' --no-pager 2>&1 | grep -E 'catalogue loaded via resilience fallback' | grep -q 'source="lkg"'
"""
requires_capability = "test_fixture_catalogue_corrupt"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.catalogue-builtin-fallback"
tier = "T2"
description = "Both configured catalogue AND last-known-good are corrupted; steward falls back to the built-in skeleton catalogue. Cleanup restores both files from a snapshot of the LKG taken before corruption."
command = """
set -eo pipefail
sudo cp /var/lib/evo/state/catalogue.lkg.toml /tmp/evo-lkg-canonical.bak
trap 'sudo cp /tmp/evo-lkg-canonical.bak /var/lib/evo/state/catalogue.lkg.toml; sudo cp /tmp/evo-lkg-canonical.bak /opt/evo/catalogue/default.toml; sudo systemctl restart evo; sleep 3' EXIT
echo "this is not valid TOML }}}" | sudo tee /opt/evo/catalogue/default.toml > /dev/null
echo "this is not valid TOML }}}" | sudo tee /var/lib/evo/state/catalogue.lkg.toml > /dev/null
sudo systemctl restart evo
sleep 4
systemctl is-active evo > /dev/null
journalctl -u evo.service --since '20 seconds ago' --no-pager 2>&1 | grep -E 'catalogue loaded via resilience fallback' | grep -q 'source="builtin"'
"""
requires_capability = "test_fixture_catalogue_corrupt"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

# --- Plugins administration ---

[[scenarios]]
id = "T2.plugins-list-installed"
tier = "T2"
description = "list_installed_plugins op returns at least the boot-admitted set. Indirectly verified via reconcile list which surfaces admitted composer/warden pairs."
command = "evo-plugin-tool admin reconcile list --socket=/run/evo/evo.sock 2>&1"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.plugins-disable-enable-cycle"
tier = "T2"
description = "disable_plugin then enable_plugin against an admitted plugin (org.evo.example.echo): plugin transitions to not-admitted on disable, persistent enabled flag flips on enable, and the plugin re-admits at the next discovery boundary (steward restart)."
command = """
set -eo pipefail
PLUGIN=org.evo.example.echo
SOCK=/run/evo/evo.sock
trap 'evo-plugin-tool admin enable $PLUGIN --socket=$SOCK --reason=acceptance-test-cleanup 2>/dev/null; sudo systemctl restart evo; sleep 3' EXIT
evo-plugin-tool admin diagnose $PLUGIN --socket=$SOCK 2>&1 | grep -q "state:            admitted"
evo-plugin-tool admin disable $PLUGIN --socket=$SOCK --reason=acceptance-test-disable 2>&1 | grep -q "change applied:         true"
sleep 1
evo-plugin-tool admin diagnose $PLUGIN --socket=$SOCK 2>&1 | grep -q "state:            not admitted"
evo-plugin-tool admin enable $PLUGIN --socket=$SOCK --reason=acceptance-test-enable 2>&1 | grep -q "change applied:         true"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=$SOCK 2>&1 | grep -q "state:            admitted"
"""
requires_capability = "test_fixture_plugin_admin"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.plugins-essential-refused"
tier = "T2"
description = "disable_plugin against a plugin admitted on a shelf declared required = true is refused with class=contract_violation subclass=essential_plugin and the plugin remains admitted. Mutates the on-disk catalogue (echo shelf gains required=true), restarts the steward, attempts disable, then restores the canonical catalogue from a /tmp snapshot."
command = """
set -eo pipefail
PLUGIN=org.evo.example.echo
SOCK=/run/evo/evo.sock
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-essential-refused.bak
sudo cp $CAT $BAK
trap 'sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
sudo sed -i '/^name = "echo"$/a required = true' $CAT
sudo systemctl restart evo
sleep 4
systemctl is-active evo > /dev/null
evo-plugin-tool admin diagnose $PLUGIN --socket=$SOCK 2>&1 | grep -q "state:            admitted"
out=$(evo-plugin-tool admin disable $PLUGIN --socket=$SOCK --reason=acceptance-test-essential 2>&1) && rc=0 || rc=$?
[ "$rc" -ne 0 ] || { echo "expected refusal, got exit 0: $out" >&2; exit 1; }
echo "$out" | grep -q "subclass=essential_plugin" || { echo "expected essential_plugin subclass: $out" >&2; exit 1; }
evo-plugin-tool admin diagnose $PLUGIN --socket=$SOCK 2>&1 | grep -q "state:            admitted"
"""
requires_capability = "test_fixture_plugin_admin"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

# --- Flight mode ---

[[scenarios]]
id = "T2.flight-mode-list"
tier = "T2"
description = "admin flight list returns the configured flight-mode rack-class set."
command = "evo-plugin-tool admin flight list --socket=/run/evo/evo.sock 2>&1 || true"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.flight-mode-set-emits"
tier = "T2"
description = "admin flight set on a class emits FlightModeChanged happening durable; consumer subscriptions receive."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.flight-rack-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-flight-rack-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-flight-set-emits.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "flight_mode"
family = "domain"
kinds = ["device"]
charter = "Synthetic flight-mode rack for acceptance scenarios."

[[racks.shelves]]
name = "bluetooth"
shape = 1
description = "Synthetic flight-mode shelf for acceptance scenarios."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
# Subscribe BEFORE the flight set so the subscription captures the
# emission. Filter to flight_mode_changed only so the assertion
# greps a clean stream.
evo-plugin-tool admin subscribe-happenings --max-count 5 --duration-secs 6 --variants flight_mode_changed --socket=/run/evo/evo.sock > /tmp/flight-happenings.out 2> /tmp/flight-happenings.err &
SUB_PID=$!
sleep 1
evo-plugin-tool admin flight set bluetooth on --socket=/run/evo/evo.sock 2>&1 | grep -q "ACTIVE"
wait $SUB_PID 2>/dev/null
grep -q '"type":"flight_mode_changed"' /tmp/flight-happenings.out
grep -q '"rack_class":"bluetooth"' /tmp/flight-happenings.out
grep -q '"on":true' /tmp/flight-happenings.out
"""
requires_capability = "test_fixture_synthetic_flight_rack"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

# --- Steward reconciliation loop ---

[[scenarios]]
id = "T2.reconciliation-list"
tier = "T2"
description = "admin reconcile list returns the configured composer/warden pair set."
command = "evo-plugin-tool admin reconcile list --socket=/run/evo/evo.sock 2>&1 || true"
timeout_secs = 30
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.reconciliation-compose-apply"
tier = "T2"
description = "Synthetic composer respondent + delivery warden are admitted on a declared `[[reconciliation_pairs]]` (acceptance.audio-pipeline). On `evo-plugin-tool admin reconcile now`, the framework's ReconciliationCoordinator runs one compose+apply cycle: composer.handle_request(\"compose\") returns a projection {pipeline:\"v1-G1\", composer_seq:1}; warden.course_correct(handle, \"apply\", payload) consumes it. Scenario greps composer-events.log for `compose generation=1` AND delivery-events.log for `apply pair=acceptance.audio-pipeline seq=1 pipeline=v1-G1`, then projects via `admin reconcile project` and asserts generation=1 and the applied_state pipeline string round-trips."
command = """
set -eo pipefail
COMPOSER=org.evoframework.acceptance.synthetic-composer
DELIVERY=org.evoframework.acceptance.synthetic-delivery-warden
COMPOSER_BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-composer-bundle.tar.gz
DELIVERY_BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-delivery-warden-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-recon-compose-apply.bak
COMPOSER_LOG=/var/lib/evo/plugins/$COMPOSER/state/composer-events.log
DELIVERY_LOG=/var/lib/evo/plugins/$DELIVERY/state/delivery-events.log
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$COMPOSER /var/lib/evo/plugins/$DELIVERY; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar", "consumer"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "composition"
shape = 1
description = "Synthetic composer shelf for reconciliation scenarios."

[[racks.shelves]]
name = "delivery"
shape = 1
description = "Synthetic delivery warden shelf for reconciliation scenarios."

[[reconciliation_pairs]]
id = "acceptance.audio-pipeline"
composer_shelf = "acceptance.composition"
warden_shelf = "acceptance.delivery"
trigger_variants = ["plugin_admitted"]
debounce_ms = 100
EOF
evo-plugin-tool install $COMPOSER_BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$COMPOSER"
evo-plugin-tool install $DELIVERY_BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$DELIVERY"
sudo systemctl restart evo
sleep 5
evo-plugin-tool admin diagnose $COMPOSER --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
evo-plugin-tool admin diagnose $DELIVERY --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
# Manual trigger bypasses the per-pair debounce window. The
# plugin_admitted happenings emitted at boot already fired the
# pair once (composer and delivery warden each admit) so the
# pair's generation may be ≥1 by this point; the manual trigger
# bumps it again. Status text is "triggered" — the actual
# outcome rides the happenings stream + the projection state.
evo-plugin-tool admin reconcile now --pair acceptance.audio-pipeline --socket=/run/evo/evo.sock 2>&1 | grep -q "triggered"
sleep 1
echo "=== composer log ==="
sudo cat $COMPOSER_LOG 2>&1
echo
echo "=== delivery log ==="
sudo cat $DELIVERY_LOG 2>&1
echo
# Compose ran at least once with the synthetic pair id.
sudo grep -q "^compose pair=acceptance.audio-pipeline generation=" $COMPOSER_LOG
# Apply ran at least once with the matching pipeline string —
# delivery log's last apply line carries `pipeline=v1-G<N>` for
# the same N as the composer's last `generation=<N>`.
LAST_GEN=$(sudo grep "^compose pair=acceptance.audio-pipeline generation=" $COMPOSER_LOG | tail -1 | sed 's/.*generation=//')
test -n "$LAST_GEN"
sudo grep -q "^apply pair=acceptance.audio-pipeline seq=$LAST_GEN pipeline=v1-G$LAST_GEN$" $DELIVERY_LOG
# Project the pair and verify generation + applied state mirrors
# the composer/delivery logs.
PROJ=$(evo-plugin-tool admin reconcile project --pair acceptance.audio-pipeline --socket=/run/evo/evo.sock)
echo "$PROJ"
echo "$PROJ" | grep -q "generation:.*$LAST_GEN"
echo "$PROJ" | grep -q "v1-G$LAST_GEN"
"""
requires_capability = "test_fixture_compose_apply_pair"
timeout_secs = 120
assertions = [
    { kind = "exit_code", expected = 0 },
]

# --- Fast Path ---

[[scenarios]]
id = "T2.fast-path-rtt"
tier = "T2"
description = "Fast-path dispatch succeeds against a synthetic warden's `ping` verb (declared in both `course_correct_verbs` and `fast_path_verbs`). The dispatch round-trips over /run/evo/fast.sock with a length-prefixed CBOR FastPathRequest::Dispatch and returns Dispatched. Asserts the operator CLI prints 'fast-path dispatch accepted' for the ping verb. Performance baselines (p50 < 5ms, p99 < 20ms) are observational and recorded in §9 of the readiness report."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.fast-path-warden
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-fast-path-warden-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-fp-rtt.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["consumer"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "fast-path"
shape = 1
description = "Synthetic warden shelf for fast-path scenarios."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:            admitted"
TAKE_OUT=$(evo-plugin-tool admin warden take-custody --shelf acceptance.fast-path --custody-type ping --socket=/run/evo/evo.sock)
HANDLE_ID=$(echo "$TAKE_OUT" | grep "^  handle_id=" | sed "s/  handle_id=//")
HANDLE_TS=$(echo "$TAKE_OUT" | grep "^  handle_started_at_ms=" | sed "s/  handle_started_at_ms=//")
evo-plugin-tool admin warden fast-path-dispatch --shelf acceptance.fast-path --verb ping --handle-id "$HANDLE_ID" --handle-started-at-ms "$HANDLE_TS" 2>&1 | grep -q "fast-path dispatch accepted"
# Best-effort release; the steward's drain loop releases on cleanup.
evo-plugin-tool admin warden release-custody --shelf acceptance.fast-path --handle-id "$HANDLE_ID" --handle-started-at-ms "$HANDLE_TS" --socket=/run/evo/evo.sock 2>&1 || true
"""
requires_capability = "test_fixture_fast_path_warden"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.fast-path-budget-refused"
tier = "T2"
description = "Fast-path dispatch against the synthetic warden's `slow` verb (which sleeps 500ms) exceeds the declared `fast_path_budget_ms = 100` and is refused by the framework with subclass `fast_path_budget_exceeded`. The refusal arrives back at the operator CLI with a structured stderr message; the scenario greps for the subclass token."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.fast-path-warden
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-fast-path-warden-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-fp-budget.bak
sudo cp $CAT $BAK
trap 'sudo rm -rf /var/lib/evo/plugins/$PLUGIN; sudo cp $BAK $CAT; sudo systemctl restart evo; sleep 3' EXIT
cat <<EOF | sudo tee -a $CAT > /dev/null

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["consumer"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "fast-path"
shape = 1
description = "Synthetic warden shelf for fast-path scenarios."
EOF
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins 2>&1 | grep -q "installed to /var/lib/evo/plugins/$PLUGIN"
sudo systemctl restart evo
sleep 4
TAKE_OUT=$(evo-plugin-tool admin warden take-custody --shelf acceptance.fast-path --custody-type slow --socket=/run/evo/evo.sock)
HANDLE_ID=$(echo "$TAKE_OUT" | grep "^  handle_id=" | sed "s/  handle_id=//")
HANDLE_TS=$(echo "$TAKE_OUT" | grep "^  handle_started_at_ms=" | sed "s/  handle_started_at_ms=//")
# Capture the stderr; the dispatch must refuse with subclass=fast_path_budget_exceeded.
OUT=$(evo-plugin-tool admin warden fast-path-dispatch --shelf acceptance.fast-path --verb slow --handle-id "$HANDLE_ID" --handle-started-at-ms "$HANDLE_TS" 2>&1 || true)
echo "$OUT" | grep -q "subclass=fast_path_budget_exceeded"
"""
requires_capability = "test_fixture_fast_path_warden"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

