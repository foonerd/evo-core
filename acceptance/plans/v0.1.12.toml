[[scenarios]]
id = "T2.appointment-wake-device"
tier = "T2"
description = """
Validates the framework's `must_wake_device=true` contract: when
a plugin schedules an appointment with `must_wake_device=true`
and `wake_pre_arm_ms=N`, the framework's `AppointmentRuntime`
calls the distribution-supplied `RtcWakeCallback::program_wake`
with `(scheduled_fire_ms - N)`.

The acceptance distribution
(`evo-acceptance-distribution`) wires a recording callback that
logs every `program_wake` invocation. The synthetic
`appointment-wake-plugin` schedules a OneShot 10s in the future
with `wake_pre_arm_ms=2000`. Asserts the framework programmed
the wake within ±5ms of `(fire_at_ms - 2000)`. The 1-2 ms
tolerance accommodates the framework's internal Instant ↔
SystemTime conversion which re-reads `Instant::now()` between
directions.

Exercises the framework contract surface only; the OS-level
suspend/resume plumbing (which on Pi 5 is hardware-blocked
pending Broadcom SDRAM PHY firmware) is the distribution's
responsibility — its `RtcWakeCallback` impl wires
`/sys/class/rtc/rtc0/wakealarm` or whatever the platform
exposes. Pi 5 does support wake-from-halt via Mechanism 2
(POWER_OFF_ON_HALT EEPROM flag); that path is exercised at the
distribution level.
"""
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.appointment-wake-plugin
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-appointment-wake-bundle.tar.gz
ACCEPTANCE_BIN=/var/lib/evo-acceptance-fixtures/evo-acceptance-distribution
EVO_BIN=/opt/evo/bin/evo
EVO_BAK=/tmp/evo-binary.bak
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-appt-wake.bak
DROP=/etc/systemd/system/evo.service.d/appointment-wake.conf
RTC_LOG=/var/lib/evo/state/rtc-wake.log
PLUGIN_STATE=/var/lib/evo/plugins/$PLUGIN/state
sudo cp $CAT $BAK
sudo cp $EVO_BIN $EVO_BAK
trap '
  sudo systemctl stop evo;
  sudo cp $EVO_BAK $EVO_BIN;
  sudo cp $BAK $CAT;
  sudo rm -rf /var/lib/evo/plugins/$PLUGIN $RTC_LOG;
  sudo rm -f $DROP;
  sudo systemctl daemon-reload;
  sudo systemctl restart evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "reload-inproc"
shape = 1
description = "In-process reload-plugin shelf (admitted by evo-acceptance-distribution)."

[[racks.shelves]]
name = "appointment-wake"
shape = 1
description = "Synthetic appointment-wake shelf."
TOML

sudo mkdir -p /etc/systemd/system/evo.service.d
sudo tee $DROP > /dev/null <<CONF
[Service]
Environment=EVO_ACCEPTANCE_RTC_WAKE_LOG=$RTC_LOG
Environment=EVO_ACCEPTANCE_WAKE_FIRE_OFFSET_MS=10000
Environment=EVO_ACCEPTANCE_WAKE_PRE_ARM_MS=2000
CONF
sudo systemctl daemon-reload

sudo systemctl stop evo
sudo cp $ACCEPTANCE_BIN $EVO_BIN
sudo chmod 755 $EVO_BIN
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins > /dev/null
sudo systemctl start evo
sleep 4

evo-plugin-tool admin diagnose $PLUGIN --socket=/run/evo/evo.sock 2>&1 | grep -q "state:.*admitted"

SCHEDULED_FIRE_MS=$(sudo grep -oP 'fire_at_ms=\\K[0-9]+' $PLUGIN_STATE/schedule.log | tail -1)
WAKE_PRE_ARM_MS=$(sudo grep -oP 'wake_pre_arm_ms=\\K[0-9]+' $PLUGIN_STATE/schedule.log | tail -1)
EXPECTED_WAKE_AT_MS=$((SCHEDULED_FIRE_MS - WAKE_PRE_ARM_MS))

TOLERANCE_MS=5
WITHIN_WINDOW=0
for at in $(sudo grep -oP 'program_wake at_ms=\\K[0-9]+' $RTC_LOG | sort -u); do
    DIFF=$((at - EXPECTED_WAKE_AT_MS))
    ABS_DIFF=${DIFF#-}
    if [ "$ABS_DIFF" -le "$TOLERANCE_MS" ]; then
        WITHIN_WINDOW=1
    fi
done
test "$WITHIN_WINDOW" = "1"

echo "T2.appointment-wake-device PASS (framework programmed RTC wake within ±${TOLERANCE_MS}ms of scheduled_fire - wake_pre_arm = ${EXPECTED_WAKE_AT_MS} ms)"
"""
requires_capability = "test_fixture_synthetic_appointment_wake"
timeout_secs = 60
assertions = [
    { kind = "exit_code", expected = 0 },
]

