[[scenarios]]
id = "T2.grammar-orphans-rename"
tier = "T2"
description = "Catalogue v1 declares acceptance_track_v1 + acceptance_track_v2 + the synthetic-grammar-source shelf. Plugin admits, announces 100 subjects of acceptance_track_v1 (env EVO_ACCEPTANCE_GRAMMAR_COUNT=100 via systemd drop-in). `admin reload catalogue --inline` swaps to v2 (drops the acceptance_track_v1 declaration; keeps the shelf); the framework's reload-time orphan rescan (admission.rs Stage 5) surfaces the 100 stranded subjects in pending_grammar_orphans. `admin grammar migrate --rename` re-states every subject to acceptance_track_v2 in batched transactions; the alias chain (kind=type_migrated) records 100 redirections. Asserts: 100 announced + 100 orphans listed + migrate output `migrated 100 subject(s)` + post-state has 0 v1 rows / 100 v2 rows / 100 type_migrated aliases / orphan row transitioned to resolved."
command = """
set -eo pipefail
PLUGIN=org.evoframework.acceptance.synthetic-grammar-source
BUNDLE=/var/lib/evo-acceptance-fixtures/synthetic-grammar-source-bundle.tar.gz
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-grammar-rename.bak
CAT_V2=/tmp/evo-cat-grammar-rename-v2.toml
DROP=/etc/systemd/system/evo.service.d/grammar-count.conf
EVENT_LOG=/var/lib/evo/plugins/$PLUGIN/state/grammar-source-events.log
DB=/var/lib/evo/state/evo.db
sudo cp $CAT $BAK
trap '
  sudo rm -rf /var/lib/evo/plugins/$PLUGIN;
  sudo cp $BAK $CAT;
  sudo rm -f $DROP $CAT_V2;
  sudo systemctl stop evo;
  sudo sqlite3 $DB "DELETE FROM subjects WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\''); DELETE FROM aliases WHERE kind='\\''type_migrated'\\''; DELETE FROM pending_grammar_orphans WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\'');" 2>/dev/null || true;
  sudo systemctl daemon-reload;
  sudo systemctl restart evo;
  sleep 3
' EXIT
sudo tee -a $CAT > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "grammar-source"
shape = 1
description = "Synthetic grammar-source shelf."

[[subjects]]
name = "acceptance_track_v1"
description = "Synthetic source subject type."

[[subjects]]
name = "acceptance_track_v2"
description = "Migration target subject type."
TOML
sudo mkdir -p /etc/systemd/system/evo.service.d
sudo tee $DROP > /dev/null <<'CONF'
[Service]
Environment=EVO_ACCEPTANCE_GRAMMAR_COUNT=100
CONF
sudo systemctl daemon-reload
evo-plugin-tool install $BUNDLE --to /var/lib/evo/plugins > /dev/null
sudo systemctl restart evo
sleep 8
sudo grep -q "^announced count=100 elapsed_ms=" $EVENT_LOG
# Build v2 catalogue: original production shelves intact, plus
# the acceptance rack with ONLY acceptance_track_v2 declared.
sudo cp $BAK $CAT_V2
sudo tee -a $CAT_V2 > /dev/null <<'TOML'

[[racks]]
name = "acceptance"
family = "domain"
kinds = ["registrar"]
charter = "Synthetic acceptance-only racks."

[[racks.shelves]]
name = "grammar-source"
shape = 1
description = "Synthetic grammar-source shelf (v2)."

[[subjects]]
name = "acceptance_track_v2"
description = "Migration target subject type (v2)."
TOML
evo-plugin-tool admin reload catalogue --inline "$(sudo cat $CAT_V2)" --socket=/run/evo/evo.sock 2>&1 | grep -q "duration ms"
sleep 2
evo-plugin-tool admin grammar list --socket=/run/evo/evo.sock | grep -q "acceptance_track_v1"
evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="acceptance test" --socket=/run/evo/evo.sock 2>&1 | grep -q 'migrated "acceptance_track_v1" -> "acceptance_track_v2": 100 subject'
ROWS_V1=$(sudo sqlite3 /var/lib/evo/state/evo.db "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1';")
ROWS_V2=$(sudo sqlite3 /var/lib/evo/state/evo.db "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v2';")
ALIASES=$(sudo sqlite3 /var/lib/evo/state/evo.db "SELECT COUNT(*) FROM aliases WHERE kind='type_migrated';")
echo "v1=$ROWS_V1 v2=$ROWS_V2 aliases=$ALIASES"
test "$ROWS_V1" = "0"
test "$ROWS_V2" = "100"
test "$ALIASES" -ge "100"
"""
requires_capability = "test_fixture_grammar_migration"
timeout_secs = 180
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.grammar-orphans-bulk-50k"
tier = "T2"
description = """
50,000 subjects, Rename strategy in foreground mode. Pre-seeds the
subjects via a recursive SQL CTE (announce-loop throughput is a
different surface and is bypassed so the migration runs against the
exact row count this scenario contracts for), hot-reloads the
catalogue to drop the source subject_type so the rows surface as
orphans, then issues `admin grammar migrate` and times the call.
The migration is single-fsync-per-batch (one BEGIN/COMMIT per
batch_size=1000), so wall-clock is dominated by storage fsync
latency. The timing assertion is storage-class-aware: NVMe <10s,
USB-SSD <90s, SD/eMMC <300s, SATA-SSD <30s, SATA-HDD <300s.
Unknown classes log the duration without an assertion so the
contract stays honest about what hardware it measured against.
Asserts: 50,000 rows seeded + 50,000 orphans listed + migrate
returns `migrated 50000 subject(s)` + post-state has 0 v1 / 50,000
v2 / 50,000 type_migrated aliases + steward responsive throughout
(systemctl active and describe-capabilities returns) + duration
within the storage-class budget.
"""
command = """
set -eo pipefail
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-grammar-bulk-50k.bak
CAT_V2=/tmp/evo-cat-grammar-bulk-50k-v2.toml
DB=/var/lib/evo/state/evo.db
sudo cp $CAT $BAK
trap '
  sudo cp $BAK $CAT;
  sudo systemctl stop evo;
  sudo sqlite3 $DB "DELETE FROM subjects WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\''); DELETE FROM aliases WHERE old_id LIKE '\\''bulk-%'\\'' OR new_id LIKE '\\''bulk-%'\\''; DELETE FROM pending_grammar_orphans WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\'');" 2>/dev/null || true;
  sudo rm -f $CAT_V2;
  sudo systemctl start evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v1"
[[subjects]]
name = "acceptance_track_v2"
TOML

sudo systemctl stop evo
SEED_NOW=$(date +%s%3N)
sudo sqlite3 $DB "
BEGIN;
WITH RECURSIVE seq(n) AS (SELECT 0 UNION ALL SELECT n+1 FROM seq WHERE n < 49999)
INSERT INTO subjects (id, subject_type, created_at_ms, modified_at_ms)
SELECT 'bulk-' || n, 'acceptance_track_v1', $SEED_NOW, $SEED_NOW FROM seq;
COMMIT;
"
ROWS_SEEDED=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1';")
echo "seeded rows: $ROWS_SEEDED"
test "$ROWS_SEEDED" = "50000"

sudo systemctl start evo
sleep 5

sudo cp $BAK $CAT_V2
sudo tee -a $CAT_V2 > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v2"
TOML
evo-plugin-tool admin reload catalogue --inline "$(sudo cat $CAT_V2)" --socket=/run/evo/evo.sock 2>&1 | grep -q "duration ms"
sleep 1
LIST_OUT=$(evo-plugin-tool admin grammar list --socket=/run/evo/evo.sock)
echo "$LIST_OUT" | grep -E "acceptance_track_v1.*50000"

echo "=== migrate (timed) ==="
START_MS=$(date +%s%3N)
evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="bulk-50k" --batch-size=1000 --socket=/run/evo/evo.sock 2>&1 | tee /tmp/migrate.out
END_MS=$(date +%s%3N)
DURATION_MS=$((END_MS - START_MS))
echo "migrate wall-clock duration: ${DURATION_MS} ms"

systemctl is-active evo > /dev/null
evo-plugin-tool admin describe-capabilities --socket=/run/evo/evo.sock > /dev/null

ROWS_V1=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1';")
ROWS_V2=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v2' AND id NOT LIKE 'bulk-%';")
ALIASES=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'bulk-%';")

DEV=$(findmnt -n -o SOURCE /var/lib/evo/state 2>/dev/null || findmnt -n -o SOURCE / )
PK=$(lsblk -no PKNAME "$DEV" 2>/dev/null | tr -d ' ')
DISK_DEV=${PK:+/dev/$PK}
DISK_DEV=${DISK_DEV:-$DEV}
TRAN=$(lsblk -ndo TRAN "$DISK_DEV" 2>/dev/null | tr -d ' ')
ROTA=$(lsblk -ndo ROTA "$DISK_DEV" 2>/dev/null | tr -d ' ')
case "$TRAN" in
    nvme)     BUDGET_MS=10000 ; CLASS="nvme" ;;
    usb)      BUDGET_MS=90000 ; CLASS="usb-ssd" ;;
    mmc|sd)   BUDGET_MS=300000; CLASS="sd-emmc" ;;
    sata|ata) if [ "$ROTA" = "0" ]; then BUDGET_MS=30000; CLASS="sata-ssd"; else BUDGET_MS=300000; CLASS="sata-hdd"; fi ;;
    *)        BUDGET_MS=0     ; CLASS="unknown($TRAN)" ;;
esac

echo "v1=$ROWS_V1 v2(new-ids)=$ROWS_V2 aliases=$ALIASES dur=${DURATION_MS}ms storage=$CLASS budget=${BUDGET_MS}ms"
test "$ROWS_V1" = "0"
test "$ROWS_V2" = "50000"
test "$ALIASES" -ge "50000"
if [ "$BUDGET_MS" -gt "0" ]; then
    test "$DURATION_MS" -lt "$BUDGET_MS"
fi
echo "T2.grammar-orphans-bulk-50k PASS (duration=${DURATION_MS}ms, class=$CLASS)"
"""
requires_capability = "test_fixture_grammar_migration"
timeout_secs = 480
assertions = [
    { kind = "exit_code", expected = 0 },
]

[[scenarios]]
id = "T2.grammar-orphans-resume-after-crash"
tier = "T2"
description = """
Crash mid-bulk; restart; subsequent migration call resumes from
the post-crash state; idempotent against already-migrated subjects.
Pre-seeds 5,000 subjects of acceptance_track_v1, hot-reloads to v2
(drops v1) and writes the v2 catalogue to disk so the post-crash
boot re-orphans the survivors. Round 1 issues `admin grammar
migrate --batch-size=200` and SIGKILLs the steward 1s in (kill -9,
not graceful). Asserts: per-batch atomicity (v1 + aliases counts
align with what was committed before the crash; pending_grammar_
orphans row in `migrating` state). Round 2 restarts the steward —
the boot rescan must preserve `migrating` (the upsert's CASE
clause does not reset migrating rows) — then re-issues migrate.
Asserts: v1=0, v2=5000, 5000 type_migrated aliases, no duplicate
new_ids, no duplicate old_ids, no chain-of-successors within the
resume-scope (a previously-migrated new_id never surfaces as an
old_id), orphan row transitions to `resolved`.
"""
command = """
set -eo pipefail
CAT=/opt/evo/catalogue/default.toml
BAK=/tmp/evo-cat-grammar-resume.bak
CAT_V2=/tmp/evo-cat-grammar-resume-v2.toml
DB=/var/lib/evo/state/evo.db
SUBJECTS=5000
sudo cp $CAT $BAK
trap '
  sudo cp $BAK $CAT;
  sudo systemctl stop evo;
  sudo sqlite3 $DB "DELETE FROM subjects WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\''); DELETE FROM aliases WHERE old_id LIKE '\\''resume-%'\\'' OR new_id LIKE '\\''resume-%'\\''; DELETE FROM aliases WHERE kind='\\''type_migrated'\\''; DELETE FROM pending_grammar_orphans WHERE subject_type IN ('\\''acceptance_track_v1'\\'', '\\''acceptance_track_v2'\\'');" 2>/dev/null || true;
  sudo rm -f $CAT_V2;
  sudo systemctl start evo;
  sleep 3
' EXIT

sudo tee -a $CAT > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v1"
[[subjects]]
name = "acceptance_track_v2"
TOML

sudo systemctl stop evo
SEED_NOW=$(date +%s%3N)
sudo sqlite3 $DB "
BEGIN;
WITH RECURSIVE seq(n) AS (SELECT 0 UNION ALL SELECT n+1 FROM seq WHERE n < $((SUBJECTS-1)))
INSERT INTO subjects (id, subject_type, created_at_ms, modified_at_ms)
SELECT 'resume-' || n, 'acceptance_track_v1', $SEED_NOW, $SEED_NOW FROM seq;
COMMIT;
"
ROWS_SEEDED=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1';")
echo "seeded rows: $ROWS_SEEDED"
test "$ROWS_SEEDED" = "$SUBJECTS"

sudo systemctl start evo
sleep 5

sudo cp $BAK $CAT_V2
sudo tee -a $CAT_V2 > /dev/null <<'TOML'

[[subjects]]
name = "acceptance_track_v2"
TOML
evo-plugin-tool admin reload catalogue --inline "$(sudo cat $CAT_V2)" --socket=/run/evo/evo.sock 2>&1 | grep -q "duration ms"
sudo cp $CAT_V2 $CAT
sleep 1
ORPHANS_BEFORE=$(sudo sqlite3 $DB "SELECT count FROM pending_grammar_orphans WHERE subject_type='acceptance_track_v1';")
test "$ORPHANS_BEFORE" = "$SUBJECTS"
echo "orphans listed: $ORPHANS_BEFORE"

echo "=== migrate (round 1, will be interrupted) ==="
evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="resume-r1" --batch-size=200 --socket=/run/evo/evo.sock > /tmp/migrate.r1.out 2>&1 &
MIGRATE_PID=$!
sleep 1
echo "killing steward mid-migrate (kill -9 evo)"
sudo pkill -9 -x evo || true
wait $MIGRATE_PID 2>/dev/null || true
sleep 1

ROWS_V1_MID=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1' AND id LIKE 'resume-%';")
ALIASES_MID=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%';")
ROWS_V2_MID=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v2' AND id IN (SELECT new_id FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%');")
ORPHAN_STATUS_MID=$(sudo sqlite3 $DB "SELECT status FROM pending_grammar_orphans WHERE subject_type='acceptance_track_v1';")
echo "mid-crash state (resume-only): v1=$ROWS_V1_MID v2=$ROWS_V2_MID aliases=$ALIASES_MID orphan_status=$ORPHAN_STATUS_MID"
test "$ROWS_V1_MID" -lt "$SUBJECTS"
test "$ROWS_V1_MID" -gt "0"
test "$ALIASES_MID" -gt "0"
EXPECTED_MIGRATED=$((SUBJECTS - ROWS_V1_MID))
test "$ALIASES_MID" = "$EXPECTED_MIGRATED"
test "$ROWS_V2_MID" = "$EXPECTED_MIGRATED"
test "$ORPHAN_STATUS_MID" = "migrating"

sudo systemctl start evo
sleep 5

ORPHAN_STATUS_BOOT=$(sudo sqlite3 $DB "SELECT status FROM pending_grammar_orphans WHERE subject_type='acceptance_track_v1';")
ORPHAN_COUNT_BOOT=$(sudo sqlite3 $DB "SELECT count FROM pending_grammar_orphans WHERE subject_type='acceptance_track_v1';")
echo "post-restart orphan: status=$ORPHAN_STATUS_BOOT count=$ORPHAN_COUNT_BOOT"
test "$ORPHAN_COUNT_BOOT" = "$ROWS_V1_MID"
test "$ORPHAN_STATUS_BOOT" = "migrating"

echo "=== migrate (round 2, resume) ==="
evo-plugin-tool admin grammar migrate --from-type=acceptance_track_v1 --to-type=acceptance_track_v2 --reason="resume-r2" --batch-size=200 --socket=/run/evo/evo.sock 2>&1 | tee /tmp/migrate.r2.out

ROWS_V1=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v1' AND id LIKE 'resume-%';")
ALIASES=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%';")
ROWS_V2=$(sudo sqlite3 $DB "SELECT COUNT(*) FROM subjects WHERE subject_type='acceptance_track_v2' AND id IN (SELECT new_id FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%');")
ORPHAN_STATUS_FINAL=$(sudo sqlite3 $DB "SELECT status FROM pending_grammar_orphans WHERE subject_type='acceptance_track_v1';")
echo "final state (resume-only): v1=$ROWS_V1 v2=$ROWS_V2 aliases=$ALIASES orphan_status=$ORPHAN_STATUS_FINAL"

test "$ROWS_V1" = "0"
test "$ROWS_V2" = "$SUBJECTS"
test "$ALIASES" = "$SUBJECTS"
test "$ORPHAN_STATUS_FINAL" = "resolved"

DUP_NEW=$(sudo sqlite3 $DB "SELECT new_id FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%' GROUP BY new_id HAVING COUNT(*) > 1;" | wc -l)
test "$DUP_NEW" = "0"
DUP_OLD=$(sudo sqlite3 $DB "SELECT old_id FROM aliases WHERE kind='type_migrated' AND old_id LIKE 'resume-%' GROUP BY old_id HAVING COUNT(*) > 1;" | wc -l)
test "$DUP_OLD" = "0"
DOUBLE_MIGRATED=$(sudo sqlite3 $DB "SELECT a1.new_id FROM aliases a1 JOIN aliases a2 ON a1.new_id=a2.old_id WHERE a1.kind='type_migrated' AND a1.old_id LIKE 'resume-%';" | wc -l)
test "$DOUBLE_MIGRATED" = "0"

echo "T2.grammar-orphans-resume-after-crash PASS (round1 migrated $EXPECTED_MIGRATED, round2 migrated $((SUBJECTS - EXPECTED_MIGRATED)), total $ALIASES aliases)"
"""
requires_capability = "test_fixture_grammar_migration"
timeout_secs = 240
assertions = [
    { kind = "exit_code", expected = 0 },
]

# --- Reload-catalogue / reload-manifest ---

[[scenarios]]
id = "T2.reload-catalogue-no-change-skip"
tier = "T2"
description = "admin reload catalogue against unchanged source: idempotent skip; from_version == to_version; duration <50ms."
command = "evo-plugin-tool admin reload catalogue --path=/etc/evo/catalogue.toml --socket=/run/evo/evo.sock 2>&1 || true"
timeout_secs = 30
assertions = [
